services:
  mongodb:
    image: mongo:7
    container_name: cloploy-mongodb
    restart: unless-stopped
    ports:
      - "3122:27017"
    volumes:
      - mongo_data:/data/db

  redis:
    image: redis:7
    container_name: cloploy-redis
    restart: unless-stopped
    ports:
      - "6379:6379"

  sonarqube:
    image: sonarqube:community
    container_name: cloploy-sonarqube
    restart: unless-stopped
    ports:
      - "9000:9000"
    environment:
      SONAR_ES_BOOTSTRAP_CHECKS_DISABLE: "true"

  jenkins:
    image: jenkins/jenkins:lts-jdk17
    container_name: cloploy-jenkins
    restart: unless-stopped
    ports:
      - "8081:8080"
      - "50000:50000"
    volumes:
      - jenkins_home:/var/jenkins_home

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.15.0
    container_name: cloploy-elasticsearch
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"

  logstash:
    image: docker.elastic.co/logstash/logstash:8.15.0
    container_name: cloploy-logstash
    restart: unless-stopped
    ports:
      - "5044:5044"
    volumes:
      - ./infra/logging/logstash.conf:/usr/share/logstash/pipeline/logstash.conf
    depends_on:
      - elasticsearch

  kibana:
    image: docker.elastic.co/kibana/kibana:8.15.0
    container_name: cloploy-kibana
    restart: unless-stopped
    environment:
      ELASTICSEARCH_HOSTS: http://elasticsearch:9200
    ports:
      - "5601:5601"
    depends_on:
      - elasticsearch

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: cloploy-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./infra/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml

  grafana:
    image: grafana/grafana:11.1.4
    container_name: cloploy-grafana
    restart: unless-stopped
    ports:
      - "3001:3000"
    depends_on:
      - prometheus

  api:
    build:
      context: ./apps/api
    container_name: cloploy-api
    restart: unless-stopped
    env_file:
      - ./.env
    environment:
      - MONGODB_URI=mongodb://cloploy-mongodb:27017/cloploy
      - REDIS_URL=redis://cloploy-redis:6379
      - CLIENT_URL=http://localhost
      - PORT=3121
    ports:
      - "5000:3121"
    depends_on:
      - mongodb
      - redis

  web:
    build:
      context: ./apps/web
    container_name: cloploy-web
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - api

volumes:
  mongo_data:
  jenkins_home: