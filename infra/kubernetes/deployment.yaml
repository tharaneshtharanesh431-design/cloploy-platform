apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloploy-web
  namespace: cloploy
spec:
  replicas: 2
  selector:
    matchLabels:
      app: cloploy-web
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: cloploy-web
    spec:
      containers:
        - name: cloploy-web
          image: 344626518012.dkr.ecr.ap-southeast-2.amazonaws.com/cloploy-web:latest
          ports:
            - containerPort: 80
          envFrom:
            - configMapRef:
                name: cloploy-config
            - secretRef:
                name: cloploy-secrets
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 30
