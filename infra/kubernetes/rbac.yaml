apiVersion: v1
kind: ServiceAccount
metadata:
  name: cloploy-app-sa
  namespace: cloploy
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: cloploy-app-role
rules:
  - apiGroups: [""]
    resources: ["pods", "services", "endpoints", "configmaps", "secrets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["deployments", "replicasets"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: cloploy-app-role-binding
subjects:
  - kind: ServiceAccount
    name: cloploy-app-sa
    namespace: cloploy
roleRef:
  kind: ClusterRole
  name: cloploy-app-role
  apiGroup: rbac.authorization.k8s.io
