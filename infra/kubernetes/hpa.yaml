apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: cloploy-web
  namespace: cloploy
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: cloploy-web
  minReplicas: 2
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
